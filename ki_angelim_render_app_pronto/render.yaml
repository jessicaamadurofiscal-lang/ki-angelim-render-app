services:
  - type: web
    name: ki-angelim-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: FLET_FORCE_WEB_SERVER
        value: "true"
      - key: FLET_SESSION_TIMEOUT
        value: "3600"
